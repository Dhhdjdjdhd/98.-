name: Deploy Backend · App Service

# backend/ 변경 시에만 실행
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: momcare-api   # ← Azure App Service(웹앱) 이름으로 교체
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json   # 서브폴더 lock 지정

      - name: Install & build
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm prune --omit=dev   # 배포 용량 축소(devDependencies 제거)

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend   # backend 폴더만 배포
